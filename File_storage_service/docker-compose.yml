services:

  postgres:
    image: postgres:15-alpine
    container_name: file-storage-db
    environment:
      POSTGRES_DB: file_storage_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: file-storage-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/file_storage_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_SECURITY_JWT_SECRET: my-super-secret-key-that-is-at-least-32-characters-long
      APP_SECURITY_JWT_EXPIRATION: 86400000
      STORAGE_LOCATION: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - file_uploads:/app/uploads
    restart: unless-stopped

volumes:
  postgres_data:
  file_uploads: